name: Update Exact Course Icons

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply exact course icons
        shell: bash
        run: |
          set -e
          ZIP_FILE=$(find . -maxdepth 1 -type f -name 'ApprenticeshipPlus_Exact_Course_Icons_Update*.zip' | head -n 1)
          test -n "$ZIP_FILE"

          rm -rf /tmp/exact-course-icons
          mkdir -p /tmp/exact-course-icons
          unzip -q "$ZIP_FILE" -d /tmp/exact-course-icons

          cp -a /tmp/exact-course-icons/. .
          rm -f ApprenticeshipPlus_Exact_Course_Icons_Update*.zip

      - name: Commit update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use exact course icons and polished navigation" || exit 0
          git push
