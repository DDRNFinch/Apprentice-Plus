name: Update Streamlined Assignments

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply streamlined assignment update
        shell: bash
        run: |
          set -e
          ZIP_FILE=$(find . -maxdepth 1 -type f -name 'ApprenticePlus_Streamlined_Assignments_Update*.zip' | head -n 1)
          test -n "$ZIP_FILE"
          rm -rf /tmp/streamlined-assignments
          mkdir -p /tmp/streamlined-assignments
          unzip -q "$ZIP_FILE" -d /tmp/streamlined-assignments
          cp -a /tmp/streamlined-assignments/courses/. courses/
          rm -f ApprenticePlus_Streamlined_Assignments_Update*.zip

      - name: Commit update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Streamline Apprentice Plus assignments" || exit 0
          git push
