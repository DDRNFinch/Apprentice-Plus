name: Update Phase 3 Settings Hub

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply Phase 3 settings update
        shell: bash
        run: |
          set -e
          ZIP_FILE=$(find . -maxdepth 1 -type f -name 'ApprenticePlus_Phase3_Settings_Hub_Update*.zip' | head -n 1)
          test -n "$ZIP_FILE"
          rm -rf /tmp/phase3-settings
          mkdir -p /tmp/phase3-settings
          unzip -q "$ZIP_FILE" -d /tmp/phase3-settings
          cp -a /tmp/phase3-settings/courses/. courses/
          rm -f ApprenticePlus_Phase3_Settings_Hub_Update*.zip

      - name: Commit update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Apprentice Plus Phase 3 settings hub" || exit 0
          git push
