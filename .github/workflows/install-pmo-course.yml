name: Install PMO Course

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Property Maintenance Operative
        shell: bash
        run: |
          set -e
          ZIP_FILE=$(find . -maxdepth 1 -type f -name 'ApprenticeshipPlus_PMO_Complete_Update*.zip' | head -n 1)
          test -n "$ZIP_FILE"
          rm -rf /tmp/pmo-course-update
          mkdir -p /tmp/pmo-course-update
          unzip -q "$ZIP_FILE" -d /tmp/pmo-course-update
          cp -a /tmp/pmo-course-update/. .
          rm -f ApprenticeshipPlus_PMO_Complete_Update*.zip

      - name: Commit PMO course
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Property Maintenance Operative course" || exit 0
          git push
