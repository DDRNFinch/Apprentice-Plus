name: Update Bricklaying Module

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Replace Bricklaying module
        shell: bash
        run: |
          set -e

          rm -rf /tmp/brick-update
          mkdir -p /tmp/brick-update

          unzip -q ApprenticePlus_Bricklaying_Update.zip -d /tmp/brick-update

          rm -rf courses/brick
          mkdir -p courses/brick

          cp -a /tmp/brick-update/courses/brick/. courses/brick/

          rm -f ApprenticePlus_Bricklaying_Update.zip

      - name: Commit update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Update Apprentice Plus Bricklaying module" || exit 0
          git push
