name: Fix PDF Course Logos

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply PDF course-logo fix
        shell: bash
        run: |
          set -e
          ZIP_FILE=$(find . -maxdepth 1 -type f -name 'ApprenticeshipPlus_PDF_Course_Logo_Header_Fix*.zip' | head -n 1)
          test -n "$ZIP_FILE"

          rm -rf /tmp/pdf-course-logo-fix
          mkdir -p /tmp/pdf-course-logo-fix
          unzip -q "$ZIP_FILE" -d /tmp/pdf-course-logo-fix

          cp -a /tmp/pdf-course-logo-fix/courses/. courses/
          rm -f ApprenticeshipPlus_PDF_Course_Logo_Header_Fix*.zip

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use matching course logos on assignment PDFs" || exit 0
          git push
