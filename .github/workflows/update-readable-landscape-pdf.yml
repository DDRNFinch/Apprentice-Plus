name: Update Readable Landscape PDF

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply readable landscape PDF update
        shell: bash
        run: |
          set -e
          ZIP_FILE=$(find . -maxdepth 1 -type f -name 'ApprenticePlus_Readable_Landscape_PDF_Update*.zip' | head -n 1)
          test -n "$ZIP_FILE"

          rm -rf /tmp/readable-landscape-pdf
          mkdir -p /tmp/readable-landscape-pdf
          unzip -q "$ZIP_FILE" -d /tmp/readable-landscape-pdf

          cp -a /tmp/readable-landscape-pdf/courses/. courses/
          rm -f ApprenticePlus_Readable_Landscape_PDF_Update*.zip

      - name: Commit update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Improve assignment PDF text readability" || exit 0
          git push
