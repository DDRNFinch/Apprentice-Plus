name: Update Apprenticeship Plus Theme

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply Apprenticeship Plus theme
        shell: bash
        run: |
          set -e
          ZIP_FILE=$(find . -maxdepth 1 -type f -name 'ApprenticeshipPlus_Green_Theme_Developer_Update*.zip' | head -n 1)
          test -n "$ZIP_FILE"

          rm -rf /tmp/apprenticeship-plus-theme
          mkdir -p /tmp/apprenticeship-plus-theme
          unzip -q "$ZIP_FILE" -d /tmp/apprenticeship-plus-theme

          cp -a /tmp/apprenticeship-plus-theme/. .
          rm -f ApprenticeshipPlus_Green_Theme_Developer_Update*.zip

      - name: Commit update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply Apprenticeship Plus evidence theme" || exit 0
          git push
