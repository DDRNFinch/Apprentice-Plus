name: Unpack Apprentice Plus

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Unpack Apprentice Plus
        shell: bash
        run: |
          set -e
          rm -rf /tmp/apprentice-plus
          mkdir -p /tmp/apprentice-plus
          unzip -q ApprenticePlus_Site.zip -d /tmp/apprentice-plus

          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            ! -name 'ApprenticePlus_Site.zip' \
            -exec rm -rf {} +

          cp -a /tmp/apprentice-plus/. .
          rm -f ApprenticePlus_Site.zip

      - name: Commit complete app
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy complete Apprentice Plus app" || exit 0
          git push
