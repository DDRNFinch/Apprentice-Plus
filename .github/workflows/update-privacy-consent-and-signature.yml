name: Update Privacy Consent and Signature

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply privacy and signature update
        shell: bash
        run: |
          set -e
          ZIP_FILE=$(find . -maxdepth 1 -type f -name 'ApprenticeshipPlus_Privacy_Consent_And_Signature_Fix*.zip' | head -n 1)
          test -n "$ZIP_FILE"
          rm -rf /tmp/privacy-signature-update
          mkdir -p /tmp/privacy-signature-update
          unzip -q "$ZIP_FILE" -d /tmp/privacy-signature-update
          cp -a /tmp/privacy-signature-update/. .
          rm -f ApprenticeshipPlus_Privacy_Consent_And_Signature_Fix*.zip

      - name: Commit update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add privacy consent and fix signature canvas" || exit 0
          git push
