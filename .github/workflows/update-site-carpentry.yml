name: Update Site Carpentry Module

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Replace Site Carpentry module
        shell: bash
        run: |
          set -e
          ZIP_FILE=$(find . -maxdepth 1 -type f -name 'ApprenticePlus_Site_Carpentry_Update*.zip' | head -n 1)
          test -n "$ZIP_FILE"

          rm -rf /tmp/site-update
          mkdir -p /tmp/site-update
          unzip -q "$ZIP_FILE" -d /tmp/site-update

          rm -rf courses/site
          mkdir -p courses/site
          cp -a /tmp/site-update/courses/site/. courses/site/

          rm -f ApprenticePlus_Site_Carpentry_Update*.zip

      - name: Commit update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update Apprentice Plus Site Carpentry module" || exit 0
          git push
