name: Fix Single Course Confirmation

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply course confirmation fix
        shell: bash
        run: |
          set -e
          ZIP_FILE=$(find . -maxdepth 1 -type f -name 'ApprenticeshipPlus_Single_Confirm_Course_Fix*.zip' | head -n 1)
          test -n "$ZIP_FILE"

          rm -rf /tmp/single-confirm-course
          mkdir -p /tmp/single-confirm-course
          unzip -q "$ZIP_FILE" -d /tmp/single-confirm-course

          cp -a /tmp/single-confirm-course/. .
          rm -f ApprenticeshipPlus_Single_Confirm_Course_Fix*.zip

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Simplify course confirmation" || exit 0
          git push
