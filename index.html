<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#152238"><title>Apprentice+</title><link rel="manifest" href="./manifest.json"><link rel="apple-touch-icon" href="./apple-touch-icon.png"><link rel="icon" href="./favicon-32x32.png"><style>
:root{--ink:#152238;--paper:#f4efe8;--line:#d9d4cc;--muted:#68727e;--accent:#a92323}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Arial,sans-serif;background:linear-gradient(145deg,#152238,#314867);display:grid;place-items:center;padding:20px;color:var(--ink)}.panel{width:min(820px,100%);background:white;border-radius:26px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.38)}.brand{display:flex;gap:14px;align-items:center}.logo{width:78px;height:78px;border-radius:20px;background:#f2eadf;color:#a92323;display:grid;place-items:center;font-weight:900;font-size:38px;border:3px solid #152238}.brand h1{font-size:38px;margin:0}.brand p{margin:4px 0 0;color:var(--muted)}.courses{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin:22px 0}.course{border:2px solid var(--line);border-radius:18px;background:#fff;padding:22px 12px;text-align:center;min-height:160px;cursor:pointer}.course span{font-size:46px;display:block}.course b{font-size:18px;display:block;margin-top:9px}.course small{display:block;color:var(--muted);margin-top:5px}.course.selected{border-color:var(--course);box-shadow:0 0 0 4px color-mix(in srgb,var(--course) 16%,transparent);transform:translateY(-2px)}.note{background:#f8f2e8;border-radius:12px;padding:13px;font-size:14px}.actions{display:flex;justify-content:flex-end;margin-top:17px}.primary,.secondary{border:0;border-radius:11px;padding:12px 17px;font-weight:900;cursor:pointer}.primary{background:var(--accent);color:#fff}.primary:disabled{opacity:.4}.secondary{background:#e9edf2}.settings{border-top:1px solid var(--line);margin-top:20px;padding-top:16px}.settings summary{cursor:pointer;font-weight:800}.pin-grid{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-top:12px}.pin-grid input{padding:11px;border:1px solid var(--line);border-radius:10px}.message{font-weight:800;margin-top:8px;min-height:20px}@media(max-width:680px){.panel{padding:20px}.brand h1{font-size:30px}.courses{grid-template-columns:1fr}.course{min-height:104px;display:grid;grid-template-columns:62px 1fr;text-align:left;align-items:center}.course span{grid-row:1/3}.course b{margin-top:0}.pin-grid{grid-template-columns:1fr}}
</style></head><body><main class="panel"><div class="brand"><div class="logo">A+</div><div><h1>Apprentice+</h1><p>Your apprenticeship companion.</p></div></div><h2>Choose your apprenticeship course</h2><p>Your selection controls the assignments, revision, EPA mocks and course resources shown in the app.</p><div class="courses"><button class="course" data-course="brick" style="--course:#a92323"><span>🧱</span><b>Bricklaying</b><small>Brick Buddy course</small></button><button class="course" data-course="site" style="--course:#2563a6"><span>🏠</span><b>Site Carpentry</b><small>Site Buddy course</small></button><button class="course" data-course="bench" style="--course:#8b5a38"><span>🪚</span><b>Bench Joinery</b><small>Bench Buddy course</small></button></div><div class="note" id="lockNote">🔒 Once confirmed, changing course requires the tutor PIN. Default PIN: <b>2468</b>.</div><div class="actions"><button class="primary" id="continue" disabled>Confirm course</button></div><details class="settings"><summary>Change tutor PIN</summary><div class="pin-grid"><input id="oldPin" type="password" inputmode="numeric" placeholder="Current PIN"><input id="newPin" type="password" inputmode="numeric" placeholder="New PIN"><button class="secondary" id="savePin">Save PIN</button></div><div class="message" id="pinMessage"></div></details></main><script src="./app.js"></script></body></html>
